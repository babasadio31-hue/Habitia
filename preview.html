    function saveWithdrawDataToLocal() {
      try {
        localStorage.setItem('habitia_withdraw_data_preview', JSON.stringify(state.withdrawData));
      } catch (e) {}
    }

    try {
      const savedWithdrawData = localStorage.getItem('habitia_withdraw_data_preview');
      if (savedWithdrawData) {
        state.withdrawData = JSON.parse(savedWithdrawData);
      }
    } catch (e) {}

    const menuItems = [
      { id: 'dashboard', name: 'Tableau de bord', icon: '📊' },
      { id: 'proprietaires', name: 'Propriétaires', icon: '👥' },
      { id: 'locataires', name: 'Locataires', icon: '👤' },

      { id: 'parametres', name: 'Paramètres', icon: '⚙️' }
    ];

    // Show Notification Toast
    function showToast(msg, icon = '✨') {
      const toast = document.getElementById('toast');
      document.getElementById('toast-msg').innerText = msg;
      document.getElementById('toast-icon').innerText = icon;
      toast.classList.remove('translate-y-20', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');
      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('translate-y-20', 'opacity-0');
      }, 3000);
    }

    // Modal Control
    function showModal(title, contentHtml) {
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-body').innerHTML = contentHtml;
      document.getElementById('modal-container').classList.remove('hidden');
    }
    function closeModal() {
      document.getElementById('modal-container').classList.add('hidden');
    }

    // Theme Toggle
    function toggleTheme() {
      state.theme = state.theme === 'light' ? 'dark' : 'light';
      const root = document.documentElement;
      root.classList.remove('light', 'dark');
      root.classList.add(state.theme);
      document.getElementById('theme-icon').innerText = state.theme === 'light' ? '🌙' : '☀️';
      showToast(`Mode ${state.theme === 'light' ? 'Clair' : 'Sombre'} activé !`);
    }

    // Authentication Actions
    function handleLogin() {
      console.log("handleLogin: Start");
      const emailEl = document.getElementById('login-email');
      const pwdEl = document.getElementById('login-pwd');
      console.log("handleLogin: Elements found:", !!emailEl, !!pwdEl);
      if (!emailEl || !pwdEl) {
        console.error("handleLogin: Elements are null!");
        return;
      }
      const email = emailEl.value;
      const pwd = pwdEl.value;
      console.log("handleLogin: email:", email, "pwd length:", pwd ? pwd.length : 0);
      if (email && pwd) {
        state.isLoggedIn = true;
        const screenLogin = document.getElementById('screen-login');
        const screenMain = document.getElementById('screen-main');
        console.log("handleLogin: Screens found:", !!screenLogin, !!screenMain);
        if (screenLogin && screenMain) {
          screenLogin.classList.add('hidden');
          screenMain.classList.remove('hidden');
          renderSidebar();
          navigateTab('dashboard');
          showToast("Connexion réussie !");
          console.log("handleLogin: Navigation complete, state.isLoggedIn:", state.isLoggedIn);
        } else {
          console.error("handleLogin: screenLogin or screenMain is null!");
        }
      } else {
        console.warn("handleLogin: Email or password empty");
        const err = document.getElementById('login-error');
        if (err) err.classList.remove('hidden');
      }
    }
    function handleLogout() {
      state.isLoggedIn = false;
      document.getElementById('screen-main').classList.add('hidden');
      document.getElementById('screen-login').classList.remove('hidden');
      document.getElementById('login-error').classList.add('hidden');
      showToast("Déconnecté avec succès.");
    }

            : 'text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/40 hover:text-slate-900 dark:hover:text-slate-100'
        }">
          <span>${item.icon}</span>
          <span>${item.name}</span>
        </button>
      `).join('');
    }

    // Navigation Tab

      state.currentTab = tabId;
      state.selectedOwnerId = null;
      renderSidebar();

              </div>

            </div>
            <div class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 p-5 rounded-xl shadow-premium">
              <div class="flex items-center justify-between">
                <div>
                  <span class="text-3xs font-bold text-slate-400 uppercase tracking-wider block">Loyers perçus</span>

                <div class="text-2xl p-2 bg-danger-50 dark:bg-danger-950/20 rounded-xl">🔨</div>

    function generateMonthsSequence(startMonthStr, count = 13) {
      const parts = startMonthStr.split('-');
      const startMonthLabel = parts[0];
      const startYearVal = parseInt(parts[1]);
      
      const frenchMonths = ['janv', 'févr', 'mars', 'avr', 'mai', 'juin', 'juil', 'août', 'sept', 'oct', 'nov', 'déc'];
      let monthIdx = frenchMonths.indexOf(startMonthLabel);
      if (monthIdx === -1) monthIdx = 0;
      
      let year = startYearVal;
      const sequence = [];
      
      for (let i = 0; i < count; i++) {
        sequence.push(`${frenchMonths[monthIdx]}-${year}`);
        monthIdx++;
        if (monthIdx >= 12) {
          monthIdx = 0;
          year++;
        }
      }

    function viewTenantBilan(tenantId) {
      state.selectedTenantId = tenantId;
      state.currentTab = 'bilan-locataire';
      
      if (!state.tenantPayments) {
        loadTenantPaymentsFromLocal();
      }
      
      if (!state.tenantPayments[tenantId]) {
        const tenant = state.locataires.find(t => t.id === tenantId);
        const startMonth = (tenant && tenant.debutMois) ? tenant.debutMois : 'mars-26';
        let defaultLoyer = (tenant && tenant.loyer) ? tenant.loyer : 150000;
        
        if (tenant && (tenant.prenom.includes('Soumaila') || tenant.nom.includes('Soumaila'))) {
          defaultLoyer = 25000;
        }
        
        const months = generateMonthsSequence(startMonth, 13);
        state.tenantPayments[tenantId] = months.map((m, idx) => ({
          mois: m,
          loyer: defaultLoyer,
          paye: idx === 0 ? defaultLoyer : 0
        }));
        saveTenantPaymentsToLocal();
      }
      renderPage();
    }

    function updateWithdrawField(fieldName, value) {
      const ownerId = state.selectedOwnerId;
      if (state.withdrawData && state.withdrawData[ownerId]) {
        state.withdrawData[ownerId][fieldName] = value;
        saveWithdrawDataToLocal();
        if (fieldName === 'fraisRate') {
          renderWithdrawTab();
        }
      }
    }

    function updateWithdrawLine(index, key, value) {
      const ownerId = state.selectedOwnerId;
      if (state.withdrawData && state.withdrawData[ownerId]) {
        state.withdrawData[ownerId].lines[index][key] = value;
        saveWithdrawDataToLocal();
        if (key === 'loyerMensuel' || key === 'montantPaye') {
          renderWithdrawTab();
        }
      }
    }

    function addWithdrawLine() {
      const ownerId = state.selectedOwnerId;
      if (state.withdrawData && state.withdrawData[ownerId]) {
        state.withdrawData[ownerId].lines.push({
          locataireName: "Nouveau Locataire",
          loyerMensuel: 100000,
          moisActuel: "juin-26",
          montantPaye: 100000,
          reliquat: 0,
          statut: "À jour"
        });
        saveWithdrawDataToLocal();
        renderWithdrawTab();
        showToast("Nouvelle ligne ajoutée.");
      }
    }

    function deleteWithdrawLine(index) {
      const ownerId = state.selectedOwnerId;
      if (state.withdrawData && state.withdrawData[ownerId]) {
        state.withdrawData[ownerId].lines.splice(index, 1);
        saveWithdrawDataToLocal();
        renderWithdrawTab();
        showToast("Ligne retirée.");
      }
    }

    function submitWithdrawal(ownerId, maxAmount) {
      const amount = parseFloat(document.getElementById('withdraw-amount').value);
      const date = document.getElementById('withdraw-date').value;
      const motif = document.getElementById('withdraw-motif').value;

      if (isNaN(amount) || amount <= 0) {
        alert("Veuillez saisir un montant valide.");
        return;
      }
      if (amount > maxAmount) {
        alert("Le montant saisi dépasse le solde disponible.");
        return;
      }
      if (!date || !motif) {
        alert("La date et le motif sont requis.");
        return;
      }

      const w = state.withdrawData[ownerId];
      if (!w.withdrawals) {
        w.withdrawals = [];
      }

      w.withdrawals.push({
        id: 'wdr-' + Date.now(),
        amount: amount,
        date: date,
        motif: motif
      });

      saveWithdrawDataToLocal();
      closeModal();
      renderOwnerSubTabContent();
      showToast(`Retrait de ${amount.toLocaleString()} FCFA enregistré.`);
    }

    function saveOwnerInfo() {
      const ownerId = state.selectedOwnerId;
      const owner = state.proprietaires.find(p => p.id === ownerId);
      if (owner) {
        owner.prenom = document.getElementById('edit-owner-prenom').value;
        owner.nom = document.getElementById('edit-owner-nom').value;
        owner.email = document.getElementById('edit-owner-email').value;
        owner.telephone = document.getElementById('edit-owner-telephone').value;
        owner.adresse = document.getElementById('edit-owner-adresse').value;
        owner.cinPasseport = document.getElementById('edit-owner-cin').value;

        showToast("Informations du propriétaire enregistrées !");
        renderPage();
      }
    }

    function uploadOwnerDoc() {
      const docName = prompt("Saisissez le nom du document (ex: Contrat_Mandat_Bailleur.pdf) :");
      if (docName) {
        const ownerId = state.selectedOwnerId;
        const owner = state.proprietaires.find(p => p.id === ownerId);
        if (owner) {
          if (!owner.docs) {
            owner.docs = [];
          }
          owner.docs.push(docName);
          renderOwnerSubTabContent();
          showToast(`Document "${docName}" rattaché.`);
        }
      }
    }

    function deleteOwnerDoc(docName) {
      if (confirm(`Voulez-vous détacher le document "${docName}" ?`)) {
        const ownerId = state.selectedOwnerId;
        const owner = state.proprietaires.find(p => p.id === ownerId);
        if (owner) {
          owner.docs = owner.docs.filter(d => d !== docName);
          renderOwnerSubTabContent();
          showToast("Document détaché.");
        }
      }
    }

    function uploadWithdrawLogoFile(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const ownerId = state.selectedOwnerId;
          state.withdrawData[ownerId].logoUrl = e.target.result;
          saveWithdrawDataToLocal();
          renderWithdrawTab();
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function printInvoice() {
      const ownerId = state.selectedOwnerId;
      const w = state.withdrawData[ownerId];
      if (!w) return;

      let totalPaye = 0;
      let totalReliquats = 0;
      w.lines.forEach(l => {
        totalPaye += parseFloat(l.montantPaye) || 0;
        totalReliquats += (parseFloat(l.loyerMensuel) || 0) - (parseFloat(l.montantPaye) || 0);
      });
      const managementFees = Math.round(totalPaye * (w.fraisRate / 100));
      const netAmount = totalPaye - managementFees;

      const printHtml = `
        <div style="font-family: Arial, sans-serif; color: black; max-width: 800px; margin: 0 auto; padding: 20px;">
          <!-- Top Header -->
          <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
            <div style="border: 1px solid black; padding: 10px; font-size: 10px; line-height: 1.4; max-width: 350px; white-space: pre-line;">
              ${w.companyInfo}
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
              <img src="${w.logoUrl || 'https://i.ibb.co/L5VbXhC/hamet-logo.png'}" style="max-height: 80px;" />
            </div>
          </div>

          <!-- Date / Object -->
          <div style="display: flex; justify-content: space-between; border-top: 1px solid black; border-bottom: 1px solid black; padding: 8px 0; margin: 15px 0; font-size: 11px; font-weight: bold;">
            <span>${w.title}</span>
            <span>Bamako le : ${w.date}</span>
          </div>

          <!-- Description -->
          <div style="font-size: 11px; margin-bottom: 15px; line-height: 1.5;">
            <p>Monsieur <strong style="text-decoration: underline;">${w.ownerText}</strong></p>
            <p style="color: #555; font-style: italic; margin-top: 5px;">${w.subText}</p>
          </div>

          <!-- Table -->
          <table style="width: 100%; border-collapse: collapse; border: 1px solid black; font-size: 10px;">
            <thead>
              <tr style="background-color: #1d4ed8; color: white; font-weight: bold; text-align: left;">
                <th style="padding: 6px; border-right: 1px solid black; border-bottom: 1px solid black;">Locataires</th>
                <th style="padding: 6px; border-right: 1px solid black; border-bottom: 1px solid black; text-align: right;">Loyer Mensuel</th>
                <th style="padding: 6px; border-right: 1px solid black; border-bottom: 1px solid black; text-align: center;">Mois Actuel</th>
                <th style="padding: 6px; border-right: 1px solid black; border-bottom: 1px solid black; text-align: right;">Montant payé</th>
                <th style="padding: 6px; border-right: 1px solid black; border-bottom: 1px solid black; text-align: right;">Reliquats</th>
                <th style="padding: 6px; text-align: center; border-bottom: 1px solid black;">Statut</th>
              </tr>
            </thead>
            <tbody>
              ${w.lines.map(l => {
                const reliquat = (parseFloat(l.loyerMensuel) || 0) - (parseFloat(l.montantPaye) || 0);
                return `
                  <tr style="border-bottom: 1px solid #ccc;">
                    <td style="padding: 6px; border-right: 1px solid black; font-weight: bold;">${l.locataireName}</td>
                    <td style="padding: 6px; border-right: 1px solid black; text-align: right;">${l.loyerMensuel.toLocaleString()} FCFA</td>
                    <td style="padding: 6px; border-right: 1px solid black; text-align: center;">${l.moisActuel}</td>
                    <td style="padding: 6px; border-right: 1px solid black; text-align: right; font-weight: bold;">${l.montantPaye.toLocaleString()} FCFA</td>
                    <td style="padding: 6px; border-right: 1px solid black; text-align: right; font-weight: bold; color: ${reliquat > 0 ? 'red' : 'black'};">${reliquat > 0 ? reliquat.toLocaleString() + ' FCFA' : '- FCFA'}</td>
                    <td style="padding: 6px; text-align: center; font-weight: bold; font-size: 8px;">
                      <span style="padding: 2px 6px; border-radius: 4px; ${
                        l.statut === 'En avance' ? 'background:#10b981;color:white;' :
                        l.statut === 'À jour' ? 'background:#eab308;color:white;' :
                        'background:#ef4444;color:white;'
                      }">${l.statut}</span>
                    </td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>

          <!-- Totals block -->
          <div style="display: flex; justify-content: flex-start; margin-top: 15px;">
            <table style="width: 250px; font-size: 10px; border: 1px solid black; padding: 8px; background-color: #f9f9f9; border-collapse: collapse;">
              <tr style="border-bottom: 1px solid #ddd;">
                <td style="padding: 4px; font-weight: bold; color: #555;">TOTAL COLLECTÉ :</td>
                <td style="padding: 4px; text-align: right; font-weight: bold;">${totalPaye.toLocaleString()} FCFA</td>
              </tr>
              <tr style="border-bottom: 1px solid #ddd;">
                <td style="padding: 4px; font-weight: bold; color: #555;">Frais de gérance (${w.fraisRate}%) :</td>
                <td style="padding: 4px; text-align: right; font-weight: bold;">${managementFees.toLocaleString()} FCFA</td>
              </tr>
              <tr style="border-bottom: 1px solid #ddd;">
                <td style="padding: 4px; font-weight: bold; color: #555;">Reliquats restants :</td>
                <td style="padding: 4px; text-align: right; font-weight: bold; color: red;">${totalReliquats.toLocaleString()} FCFA</td>
              </tr>
              <tr style="font-size: 11px; font-weight: bold; color: #1d4ed8;">
                <td style="padding: 6px 4px 4px 4px;">NET À REVERSER :</td>
                <td style="padding: 6px 4px 4px 4px; text-align: right; font-size: 12px; font-weight: 900;">${netAmount.toLocaleString()} FCFA</td>
              </tr>
            </table>
          </div>

          <!-- Signatures -->
          <div style="display: flex; justify-content: space-between; margin-top: 40px; padding-top: 20px; border-top: 1px dashed black; text-align: center; font-size: 10px;">
            <div style="width: 200px;">
              <span style="font-weight: bold; display: block; text-transform: uppercase; color: #777; margin-bottom: 50px;">Le Bénéficiaire</span>
              <strong style="text-decoration: underline; font-size: 11px;">${w.beneficiaireName}</strong>
            </div>
            <div style="width: 200px;">
              <span style="font-weight: bold; display: block; text-transform: uppercase; color: #777; margin-bottom: 50px;">Le Gérant</span>
              <strong style="text-decoration: underline; font-size: 11px;">${w.gerantName}</strong>
            </div>
          </div>
        </div>
      `;

      const originalBody = document.body.innerHTML;
      document.body.innerHTML = printHtml;
      
      setTimeout(() => {
        window.print();
        document.body.innerHTML = originalBody;
        window.location.reload();
      }, 250);
    }


    // Tenant Actions
    function sendQuittanceEmail(name) {
      showToast(`Quittance de loyer envoyée par e-mail à ${name} !`);
    }

    // Bookkeeping PDF download simulation
    function downloadReceipt(payId) {
      showToast("Quittance PDF générée par le serveur PDFKit. Téléchargement lancé...");
      // Simulating browser download
      setTimeout(() => {
        alert("Téléchargement du reçu PDF quittance simulé avec succès !");
      }, 500);
    }
    function exportCSV() {
      showToast("Exportation des transactions en CSV réussie !");
    }

    // Backup download simulation
    function downloadBackup() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
      const dlAnchor = document.createElement('a');
      dlAnchor.setAttribute("href", dataStr);
      dlAnchor.setAttribute("download", "habitia_preview_backup.json");
      dlAnchor.click();
      showToast("Sauvegarde JSON téléchargée.");
    }

    // Default initialization
    window.onload = () => {
      // Auto light mode theme init
      const root = document.documentElement;
      root.classList.add('light');
      loadTenantPaymentsFromLocal();
      
      // Auto bypass login screen since isLoggedIn is true by default
      const screenLogin = document.getElementById('screen-login');
      const screenMain = document.getElementById('screen-main');
      if (screenLogin && screenMain) {
        screenLogin.classList.add('hidden');
        screenMain.classList.remove('hidden');
        renderSidebar();
        navigateTab('dashboard');
      }
    };
  </script>
</body>
</html>
